services:
  backend:
    build: ./backend
    expose:
      - "8000"
    volumes:
      - acm-data:/data
    env_file:
      - ./backend/.env
    environment:
      - CORS_ORIGINS=http://localhost

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  acm-data:
